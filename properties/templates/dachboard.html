<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>My Favorite Properties</h2>
<h1>My Favorite Properties</h1>

{% for item in favorites %}

<h3>{{ item.property.title }}</h3>

<p>{{ item.property.location }}</p>

<p>₹{{ item.property.price }}</p>

<hr>

{% empty %}

<p>No favorites yet.</p>

{% endfor %}
{% for fav in favorites %}
    <h4>{{ fav.property.title }}</h4>
{% endfor %}

</body>
</html>
